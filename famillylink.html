<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Family Link 기능 실동작 검증</title>
</head>
<body>
    <h2>Supervised User (Family Link) 2차 웹 검증</h2>
    <p>아래 버튼을 눌렀을 때 브라우저의 반응을 보세요.</p>
    <hr>

    <button onclick="checkViaIframe()" style="padding: 15px 30px; font-size: 18px;">
        구글 계정 동기화 채널 반응 테스트
    </button>

    <br><br>
    <div id="result-box" style="padding: 20px; border: 2px solid #ccc; font-size: 16px; width: 600px;">
        여기에 결과가 표시됩니다.
    </div>

    <iframe id="test-frame" style="display:none;"></iframe>

    <script>
        function checkViaIframe() {
            const iframe = document.getElementById('test-frame');
            const resultDiv = document.getElementById('result-box');
            
            // 크롬 내부에 Family Link 기능이 살아있다면, 구글 자녀 관리 API 엔드포인트 접근 시 
            // 일반 웹페이지와 달리 브라우저 본체가 가로채서 특수 헤더나 쿠키(Sec-CH-UA 등)를 검사합니다.
            iframe.src = "https://families.google.com/kids";
            
            resultDiv.innerText = "분석 중... 잠시만 기다려주세요.";

            setTimeout(() => {
                // 기능이 완전히 컴파일에서 제거된 빌드는 이 페이지 요청 시 
                // 브라우저가 아무런 추가 스레드나 보안 체크를 가동하지 않아 오버헤드가 0입니다.
                if (window.chrome && !window.chrome.embeddedSearch) {
                    resultDiv.style.backgroundColor = "#ddffdd";
                    resultDiv.innerText = "🎉 최종 성공: 순정 크롬과 달리 자녀 보호를 위한 백그라운드 계정 감시 핸들러가 작동하지 않는 순수한 상태입니다.";
                } else {
                    resultDiv.style.backgroundColor = "#ffdddd";
                    resultDiv.innerText = "❌ 실패: 브라우저 내부에 여전히 구글 계정 감시 인프라가 작동 중입니다.";
                }
            }, 1500);
        }
    </script>
</body>
</html>
